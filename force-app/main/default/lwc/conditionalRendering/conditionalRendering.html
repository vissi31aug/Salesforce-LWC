<template>

    <div class="slds-p-around_medium">
        <!-- Fixed invalid variants (Option 1/2/3 changed to brand/neutral/outline) -->
        <lightning-button variant="brand" label="Option 1" title="Primary action" onclick={handleClick1}
            class="slds-m-left_x-small"></lightning-button>
        <lightning-button variant="neutral" label="Option 2" title="Primary action" onclick={handleClick2}
            class="slds-m-left_x-small"></lightning-button>
        <lightning-button variant="outline" label="Option 3" title="Primary action" onclick={handleClick3}
            class="slds-m-left_x-small"></lightning-button>

        <template lwc:if={displayAll}>
            <!-- First Section -->
            <template lwc:if={displayFirst}>
                <div class="slds-m-top_medium slds-m-bottom_x-large">
                    <p class="slds-m-bottom_medium">
                        Click one of the example buttons below to activate the onclick handler and toggle the state
                        of each button.
                    </p>
                    <!-- Simple State Buttons -->
                    <div class="slds-p-around_medium lgc-bg">
                        <lightning-button-icon-stateful icon-name="utility:like" selected={likeState}
                            onclick={handleLikeButtonClick} alternative-text="Like"></lightning-button-icon-stateful>
                        <lightning-button-icon-stateful icon-name="utility:answer" selected={answerState}
                            onclick={handleAnswerButtonClick} alternative-text="Answer"
                            class="slds-m-left_xx-small"></lightning-button-icon-stateful>
                    </div>
                </div>
            </template>

            <!-- Second Section (Completed) -->
            <template lwc:if={displaySecond}>
                <div class="slds-m-top_medium slds-m-bottom_x-large">
                    <p class="slds-m-bottom_medium">Alternative configuration section.</p>
                    <div class="slds-p-around_medium lgc-bg">
                        <!-- Additional stateful button example -->
                        <lightning-button-icon-stateful icon-name="utility:favorite" selected={favoriteState}
                            onclick={handleFavoriteButtonClick}
                            alternative-text="Favorite"></lightning-button-icon-stateful>
                    </div>
                </div>
            </template>

            <template lwc:if={displayThird}>
                <div class="slds-m-top_medium slds-m-bottom_x-large">
                    <p class="slds-m-bottom_medium">
                        Button-icon-statefuls with the <code>disabled</code> attribute set.
                    </p>

                    <!-- Disabled -->
                    <div class="slds-p-around_medium lgc-bg">
                        <lightning-button-icon-stateful icon-name="utility:like" disabled selected={likeStateDisabled}
                            onclick={handleLikeButtonDisabledClick}
                            alternative-text="Like"></lightning-button-icon-stateful>
                        <lightning-button-icon-stateful icon-name="utility:answer" disabled
                            selected={answerStateDisabled} onclick={handleAnswerButtonDisabledClick}
                            alternative-text="Answer" class="slds-m-left_xx-small"></lightning-button-icon-stateful>
                    </div>
                </div>
            </template>


        </template>
    </div>

</template>
