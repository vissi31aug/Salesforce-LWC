<template>
    <lightning-card title="Generic Error Utility">

        <div class="slds-p-around_medium">
            <template if:true={error.length}>
                <div class="errorCss">
                    <b>
                        <p>Please fix the error</p>
                    </b>
                    <template for:each={error} for:item="err">
                        <p key={err.fielsdName}>
                            {err.errorMsg}
                        </p>
                    </template>
                </div>
            </template>

        </div>


        <div class="slds-var-m-around_medium">
            <lightning-input type="text" label="Name" value={name} data-field="name"
                onchange={handleChange}></lightning-input>
            <lightning-input type="email" label="Email" value={email} data-field="email"
                onchange={handleChange}></lightning-input>
            <lightning-input type="tel" label="Phone" value={phone} data-field="phone"
                onchange={handleChange}></lightning-input>
            <lightning-input type="number" label="Age" value={age} data-field="age"
                onchange={handleChange}></lightning-input>

            <div class="slds-var-m-top_medium">
                <lightning-button label="Submit" variant="brand" onclick={handleClick}></lightning-button>
            </div>
        </div>
    </lightning-card>
</template>
